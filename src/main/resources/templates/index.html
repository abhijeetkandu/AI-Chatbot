<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCart Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark: #1a3c2b;
            --green-mid: #2d6a4f;
            --green-light: #52b788;
            --cream: #f5f0e8;
            --warm-white: #fdfaf5;
            --accent: #e76f51;
            --text-dark: #1a1a1a;
            --text-muted: #7a7a6a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 60%, var(--green-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-window {
            width: 380px;
            max-height: 580px;
            background: var(--warm-white);
            border-radius: 18px;
            border: 1px solid rgba(45,106,79,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .chat-header {
            background: var(--green-dark);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .chat-header-icon {
            width: 38px; height: 38px;
            background: var(--green-light);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .chat-header-text h4 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
        }
        .chat-header-text p {
            color: rgba(255,255,255,0.6);
            font-size: 11px;
        }
        .online-dot {
            width: 8px; height: 8px;
            background: var(--green-light);
            border-radius: 50%;
            margin-left: auto;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--warm-white);
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(45,106,79,0.2); border-radius: 4px; }
        .msg-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 3px;
            color: var(--green-light);
        }
        .msg-label.user { color: rgba(255,255,255,0.7); text-align: right; }
        .msg {
            max-width: 82%;
            padding: 9px 13px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg.bot {
            background: #fff;
            color: var(--text-dark);
            border: 1px solid rgba(45,106,79,0.12);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        .msg.user {
            background: var(--green-mid);
            color: #fff;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .typing-indicator {
            display: flex; gap: 4px; align-items: center;
            padding: 10px 13px;
            background: #fff;
            border: 1px solid rgba(45,106,79,0.12);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
        .typing-indicator span {
            width: 6px; height: 6px;
            background: var(--green-light);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        .chat-suggestions {
            padding: 0 14px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            background: var(--warm-white);
        }
        .suggestion-chip {
            background: var(--cream);
            color: var(--green-dark);
            border: 1px solid rgba(45,106,79,0.18);
            border-radius: 50px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            font-family: 'DM Sans', sans-serif;
        }
        .suggestion-chip:hover { background: var(--green-light); color: #fff; border-color: var(--green-light); }
        .chat-input-area {
            padding: 10px 12px 12px;
            background: #fff;
            border-top: 1px solid rgba(45,106,79,0.1);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        #chat-input {
            flex: 1;
            border: 1px solid rgba(45,106,79,0.2);
            border-radius: 50px;
            padding: 9px 16px;
            font-size: 13.5px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            background: var(--warm-white);
            color: var(--text-dark);
        }
        #chat-input:focus { border-color: var(--green-mid); }
        #send-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #send-btn:hover { background: #cf5a3b; }
        .powered-by {
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            padding: 4px;
            background: #fff;
        }
    </style>
</head>
<body>
<div class="chat-window">
    <div class="chat-header">
        <div class="chat-header-icon">🌿</div>
        <div class="chat-header-text">
            <h4>GreenCart Assistant</h4>
            <p>Ask me anything about our store</p>
        </div>
        <div class="online-dot"></div>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div>
            <div class="msg-label">GreenCart</div>
            <div class="msg bot">👋 Hi! I'm your GreenCart assistant. Ask me about products, delivery, offers, or anything about the store!</div>
        </div>
    </div>

    <div class="chat-suggestions" id="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion('What products do you have?')">Products</button>
        <button class="suggestion-chip" onclick="sendSuggestion('How does delivery work?')">Delivery</button>
        <button class="suggestion-chip" onclick="sendSuggestion('Any offers today?')">Offers</button>
        <button class="suggestion-chip" onclick="sendSuggestion('How do I place an order?')">Place order</button>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Ask about GreenCart..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button id="send-btn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
    <div class="powered-by">Powered by GreenCart AI</div>
</div>

<script>
    function appendMessage(text, type) {
        const msgs = document.getElementById('chat-messages');
        const wrapper = document.createElement('div');
        const label = document.createElement('div');
        label.className = 'msg-label ' + type;
        label.textContent = type === 'bot' ? 'GreenCart' : 'You';
        const msg = document.createElement('div');
        msg.className = 'msg ' + type;
        msg.textContent = text;
        wrapper.appendChild(label);
        wrapper.appendChild(msg);
        msgs.appendChild(wrapper);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
        const msgs = document.getElementById('chat-messages');
        const el = document.createElement('div');
        el.className = 'typing-indicator';
        el.id = 'typing';
        el.innerHTML = '<span></span><span></span><span></span>';
        msgs.appendChild(el);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typing');
        if (el) el.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const query = input.value.trim();
        if (!query) return;
        input.value = '';
        document.getElementById('suggestions').style.display = 'none';
        appendMessage(query, 'user');
        showTyping();
        try {
            const res = await fetch('/ai/groq?query=' + encodeURIComponent(query), { method: 'POST' });
            const text = await res.text();
            removeTyping();
            appendMessage(text, 'bot');
        } catch (e) {
            removeTyping();
            appendMessage('Sorry, could not connect. Please try again!', 'bot');
        }
    }

    function sendSuggestion(text) {
        document.getElementById('chat-input').value = text;
        sendMessage();
    }
</script>
</body>
</html>
